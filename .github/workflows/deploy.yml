name: Deploy API

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/api-elysia

            git config --global --add safe.directory /var/www/api-elysia
            git fetch origin
            git reset --hard origin/main

            echo "⚙️ create .env file"
            cat > .env << EOF
            ${{ secrets.ENV_ELYSIA }}
            EOF

            echo "🐳 restart docker"
            sudo docker compose build
            sudo docker compose up -d
            sudo docker image prune -f