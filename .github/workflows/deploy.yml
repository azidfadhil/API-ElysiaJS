name: Deploy API

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /var/www/api-elysia

            echo "📥 Pull latest code"
            git config --global --add safe.directory /var/www/api-elysia
            git fetch origin
            git reset --hard origin/main

            echo "⚙️ Create .env"
            cat > .env << 'EOF'
            ${{ secrets.ENV_ELYSIA }}
            EOF

            echo "🐳 Deploy"
            docker compose up -d --build --remove-orphans

            echo "🧽 Clean images"
            docker image prune -f

            echo "✅ Deploy complete"
            docker compose ps